name: .github/workflows/update_and_deploy.yml

on:
  workflow_dispatch:
  schedule:
    - cron: "20 7 * * *"
      timezone: "Asia/Shanghai"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-update-and-deploy
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install --no-deps -e .

      - name: Quality checks
        run: |
          ruff check .
          mypy src
          pytest -q

      - name: Build offline demo for pushes
        if: github.event_name == 'push'
        run: python -m theory_daily.cli demo --fixtures

      - name: Validate offline demo for pushes
        if: github.event_name == 'push'
        run: python -m theory_daily.cli validate

      - name: Build publishable history for pushes
        if: github.event_name == 'push'
        run: python -m theory_daily.cli build

      - name: Run official daily update
        if: github.event_name != 'push'
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}
          OPENAI_REASONING_EFFORT: low
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          MAX_LLM_PAPERS_PER_RUN: "60"
        run: python -m theory_daily.cli update --since-days 7

      - name: Validate static output
        run: python -m theory_daily.cli validate

      - name: Persist official data history
        if: github.event_name != 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): daily update $(date -u +%F) [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          echo "## Black Hole Theory Daily" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "- 模式：离线 demo（8 篇虚构示例）" >> "$GITHUB_STEP_SUMMARY"
          else
            REPORT=$(find data/reports -name '*.json' -type f | sort | tail -1)
            if [ -n "$REPORT" ]; then
              python -c "import json,sys; d=json.load(open(sys.argv[1],encoding='utf-8')); print('\n'.join(f'- {k}: {d.get(k)}' for k in ('status','fetched_arxiv','fetched_inspire','deduplicated','candidates','selected','review_queue','rejected')))" "$REPORT" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
